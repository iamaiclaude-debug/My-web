<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamAI</title>
<style>
body{font-family:sans-serif;background:#0f0f14;color:#fff;text-align:center;padding:40px}
textarea{width:90%;height:120px;margin:10px;border-radius:8px;padding:10px}
button{padding:12px 20px;background:#6c63ff;color:#fff;border:none;border-radius:8px;cursor:pointer}
#output{margin-top:20px;text-align:left;max-width:700px;margin:auto}
.card{background:#1a1a24;padding:15px;border-radius:10px;margin-bottom:10px}
.ans{color:#22c97a}
.err{color:#ff5c5c}
</style>
</head>
<body>

<h2>ExamAI Question Generator</h2>

<textarea id="input" placeholder="Topic ya chapter text daalo..."></textarea><br>
<button onclick="generate()">Generate Questions</button>

<div id="output"></div>

<script>
async function generate() {
  const text = document.getElementById("input").value.trim();
  const output = document.getElementById("output");

  if (!text) {
    alert("Kuch text daalo 😅");
    return;
  }

  output.innerHTML = "Loading...";

  const prompt = `
You are an expert exam paper creator.

Generate 5 MCQ questions.

Return ONLY JSON:

{
 "questions":[
  {
   "question":"...",
   "options":["A) ...","B) ...","C) ...","D) ..."],
   "answer":"A) ..."
  }
 ]
}

Topic: ${text}
`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    let parsed;
    try {
      parsed = JSON.parse(data.text.replace(/```json|```/g,'').trim());
    } catch {
      throw new Error("AI ne invalid JSON diya");
    }

    let html = "";
    parsed.questions.forEach((q,i)=>{
      html += `<div class="card">
        <b>Q${i+1}:</b> ${q.question}<br><br>
        ${q.options.map(o=>`<div>${o}</div>`).join('')}
        <div class="ans">Ans: ${q.answer}</div>
      </div>`;
    });

    output.innerHTML = html;

  } catch (e) {
    output.innerHTML = `<p class="err">Error: ${e.message}</p>`;
  }
}
</script>

</body>
</html>
